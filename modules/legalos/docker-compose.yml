services:
  mongo:
    image: mongo:7
    container_name: woxox-legalos-mongo
    restart: unless-stopped
    volumes:
      - woxox_legalos_mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - legalos

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: woxox-legalos-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/woxox_legalos
      LEGALOS_ENABLED: "true"
      LEGALOS_USE_MEMORY_MONGO: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-woxox}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-legalos}
      WORKSPACE_AUTH_MODE: claim
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      TRUST_PROXY: "true"
      LEGALOS_REQUIRE_S3: ${LEGALOS_REQUIRE_S3:-false}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-ap-south-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks:
      - legalos

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1/legal}
        NEXT_PUBLIC_LEGALOS_BEARER_TOKEN: ${NEXT_PUBLIC_LEGALOS_BEARER_TOKEN}
        NEXT_PUBLIC_WORKSPACE_ID: ${NEXT_PUBLIC_WORKSPACE_ID}
        NEXT_PUBLIC_ALLOW_MOCKS: "false"
    container_name: woxox-legalos-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - legalos

volumes:
  woxox_legalos_mongo:

networks:
  legalos:
    driver: bridge
