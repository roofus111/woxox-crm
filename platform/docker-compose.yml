# WOXOX CRM Platform — local development stack
# Postgres + Redis (+ optional OpenSearch later)

services:
  postgres:
    image: postgres:16-alpine
    container_name: woxox-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: woxox
      POSTGRES_PASSWORD: woxox_dev
      POSTGRES_DB: woxox_crm
    ports:
      - '5432:5432'
    volumes:
      - woxox_crm_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U woxox -d woxox_crm']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: woxox-crm-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - woxox_crm_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  woxox_crm_pg:
  woxox_crm_redis:
