# Upstream services (Docker internal DNS)
# Use variables + Docker DNS so nginx can start even if a backend is briefly down.
resolver 127.0.0.11 valid=10s ipv6=off;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name app.woxox.com api.woxox.com platform.woxox.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# CRM Web (Next.js)
server {
    listen 443 ssl;
    http2 on;
    server_name app.woxox.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 50m;

    location / {
        set $upstream_web crm-web:3000;
        proxy_pass http://$upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Legacy CRM API (crmserver)
server {
    listen 443 ssl;
    http2 on;
    server_name api.woxox.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 100m;

    location / {
        set $upstream_legacy crmserver:8000;
        proxy_pass http://$upstream_legacy;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Platform CRM API (NestJS)
server {
    listen 443 ssl;
    http2 on;
    server_name platform.woxox.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        set $upstream_platform crm-api:4001;
        proxy_pass http://$upstream_platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
