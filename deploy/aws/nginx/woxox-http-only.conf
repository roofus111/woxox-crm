# HTTP-only config for initial testing before TLS is configured.
# Replace woxox.conf with this file, or mount this instead.

upstream crm_web {
    server crm-web:3000;
}

upstream crm_legacy_api {
    server crmserver:8000;
}

upstream crm_platform_api {
    server crm-api:4001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    # CRM UI — http://<EC2_IP>/
    location / {
        proxy_pass http://crm_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy API — http://<EC2_IP>/legacy-api/
    location /legacy-api/ {
        rewrite ^/legacy-api/(.*)$ /$1 break;
        proxy_pass http://crm_legacy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Platform API — http://<EC2_IP>/platform-api/
    location /platform-api/ {
        rewrite ^/platform-api/(.*)$ /$1 break;
        proxy_pass http://crm_platform_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
